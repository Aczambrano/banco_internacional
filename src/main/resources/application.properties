spring.application.name=account

server.port=8081

bank.account.get.client.url = http://localhost:8089/clients/

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bank_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true


# LOGGING
logging.level.org.springframework=DEBUG
logging.level.com.bank.account=DEBUG